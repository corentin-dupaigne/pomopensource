apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    {{- include "pomopensource.labels" . | nindent 4 }}
  name: {{ include "pomopensource.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pomopensource.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pomopensource.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        name: {{ .Chart.Name }}
        imagePullPolicy: Always
        ports:
        - containerPort: {{ .Values.containerPort }}
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "pomopensource.fullname" . }}
        - secretRef:
            name: {{ include "pomopensource.fullname" . }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
