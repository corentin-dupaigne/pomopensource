{{- if not .Values.app.existingSecret }}
{{- $name := printf "%s-app" (include "pomopensource.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $appKey := "" -}}
{{- if and $existing (hasKey $existing.data "APP_KEY") -}}
{{-   $appKey = index $existing.data "APP_KEY" | b64dec -}}
{{- else if .Values.app.key -}}
{{-   $appKey = .Values.app.key -}}
{{- else -}}
{{-   $appKey = printf "base64:%s" (randAlphaNum 32 | b64enc) -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pomopensource.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_KEY: {{ $appKey | quote }}
{{- end }}
