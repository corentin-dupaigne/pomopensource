replicaCount: 1

image:
  repository: "ghcr.io/corentin-dupaigne/pomopensource/pomopensource"
  tag: "prod"

hostname: "pomopensource.corentindupaigne.com"

gateway:
  name: gateway
  namespace: default

servicePort: 80
containerPort: 80

app:
  env: production
  url: "https://pomopensource.corentindupaigne.com"
  key: ""  # required: set with --set app.key=<value>

mysql:
  enabled: true
  auth:
    database: pomopensource
    username: pomopensource
    password: ""  # required: set with --set mysql.auth.password=<value>
